[build]
builder = "NIXPACKS"
buildCommand = "npm install"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "cedinord-marketing-hub"

[services.healthcheck]
path = "/health"
interval = 30
timeout = 10
